[server]
address = "0.0.0.0"
port = 2333
authorization = "youshallnotpass"
player_update_interval = 5        # seconds
stats_interval = 30               # seconds
websocket_ping_interval = 20      # seconds
max_event_queue_size = 100

[player]
stuck_threshold_ms = 10000
buffer_duration_ms = 400
frame_buffer_duration_ms = 5000
resampling_quality = "medium"                                                  # low | medium | high
opus_encoding_quality = 10                                                     # 1-10
tape = { tape_stop = true, tape_stop_duration_ms = 500, curve = "sinusoidal" } # curve: linear | exponential | sinusoidal

[player.mirrors]
# List of mirror provider patterns. %ISRC% or %QUERY%
providers = ["ytsearch:%ISRC%", "ytsearch:%QUERY%", "scsearch:%QUERY%"]

[player.mirrors.best_match]
# Enable weighted scoring to find the best-matching candidate.
# When false, the first resolvable result from each provider is accepted immediately.
# Default: true
scoring = true

# Prefixes treated as throttled (rate-sensitive) — tried sequentially after all parallel free providers.
# Default: ["ytmsearch:", "ytsearch:"]
throttled_prefixes = ["ytmsearch:", "ytsearch:"]

# Confidence thresholds (only used when scoring = true). All values in [0.0, 1.0].
# immediate_use   — accept instantly, cancel remaining parallel searches.
# high_confidence — try up to 2 candidates instead of 3.
# min_similarity  — discard anything below this score entirely.
immediate_use   = 0.88
high_confidence = 0.75
min_similarity  = 0.50

# Scoring weights (should sum to 1.0).
weight_title    = 0.50
weight_artist   = 0.30
weight_duration = 0.20

# Milliseconds within which two track durations are considered identical.
duration_tolerance_ms = 3000

[logging]
level = "info"              # trace | debug | info | warn | error | off
# Filter logs from specific modules. Use "module=level" separated by commas.
# Example: "rustalink=debug,mpa=off" (to suppress MP3 decoder warnings)
filters = "rustalink=info,mpa=off"

[logging.file]
path = "./logs/rustalink.log"
max_lines = 10000
rotate_daily = false  # when true, creates rustalink-YYYY-MM-DD.log each day
max_files = 7         # max daily log files to keep (0 = unlimited, only applies when rotate_daily = true)

[route_planner]
enabled = false
cidrs = []        # ["1.2.3.4/24"]
excluded_ips = []

[sources.youtube]
enabled = true
#refresh_tokens = [] # for tv client playback
get_oauth_token = false

[sources.youtube.clients]
search = ["TVHTML5_SIMPLY", "MUSIC_ANDROID", "ANDROID", "WEB"]
playback = ["ANDROID_VR", "TV_CAST", "WEB_EMBEDDED", "TV", "WEB", "IOS", "MWEB"]
resolve = ["TVHTML5_SIMPLY", "TVHTML5_UNPLUGGED", "WEB", "MWEB", "IOS", "ANDROID"]

