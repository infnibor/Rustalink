[server]
address = "0.0.0.0"
port = 2333
authorization = "youshallnotpass"
player_update_interval = 100      # ms
stats_interval = 60               # seconds
websocket_ping_interval = 30      # seconds
max_event_queue_size = 100

[player]
stuck_threshold_ms = 10000
buffer_duration_ms = 400
frame_buffer_duration_ms = 5000
resampling_quality = "medium"                                                  # low | medium | high
opus_encoding_quality = 10                                                     # 1-10
tape = { tape_stop = true, tape_stop_duration_ms = 500, curve = "sinusoidal" } # curve: linear | exponential | sinusoidal

[player.mirrors]
# List of mirror provider patterns. %ISRC% or %QUERY%
providers = ["ytsearch:%ISRC%", "ytsearch:%QUERY%", "scsearch:%QUERY%"]

[logging]
level = "info"              # trace | debug | info | warn | error | off
filters = "rustalink=debug" # e.g. "rustalink=debug,davey=off"

[logging.file]
path = "./logs/rustalink.log"
max_lines = 10000

[route_planner]
enabled = false
cidrs = []        # ["1.2.3.4/24"]
excluded_ips = []

[sources.youtube]
enabled = true
refresh_tokens = []     # ["token1", "token2"]
get_oauth_token = false

[sources.youtube.clients]
search = ["MUSIC_ANDROID", "MUSIC_WEB", "ANDROID", "WEB"]
playback = [
    "ANDROID_VR",
    "TV_CAST",
    "ANDROID_MUSIC",
    "WEB_EMBEDDED",
    "TV",
    "WEB",
    "IOS",
]
resolve = ["WEB", "MUSIC_WEB", "ANDROID", "TVHTML5_SIMPLY"]

[sources.youtube.cipher]
# url = "http://your-cipher-host/js"
# token = "your-auth-token"

[sources.spotify]
enabled = true
search_limit = 10
recommendations_limit = 10
playlist_load_limit = 6
album_load_limit = 6
playlist_page_load_concurrency = 10
album_page_load_concurrency = 5
track_resolve_concurrency = 50
# proxy = { url = "http://proxy:8080", username = "user", password = "pass" }

